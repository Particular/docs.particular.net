name: PullRequest
on: pull_request
env:
  DOTNET_NOLOGO: true
  DOTNET_ROLL_FORWARD: Major
defaults:
  run:
    shell: bash
jobs:
  content-verification:
    name: Content verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json
        # Caching is done to limit data transfer on each PR, not to optimize CI speed
      - name: Check docstool version for cache
        run: |
           echo "DOCSTOOL_VERSION=$(curl --connect-timeout 5 --max-time 15 --silent --show-error https://s3.amazonaws.com/particular.downloads/Particular.DocsTool/version.json)" >> $GITHUB_ENV
      - name: Cache docstool
        id: cache-docstool
        uses: actions/cache@v6.1.0
        with:
          path: |
             ~/.dotnet/tools/docstool
             ~/.dotnet/tools/.store/particular.docstool
          key: docstool-${{ FromJson(env.DOCSTOOL_VERSION).version }}
      - name: Install docstool
        if: steps.cache-docstool.outputs.cache-hit != 'true'
        run: dotnet tool install Particular.DocsTool --global
      - name: Run docstool
        run: docstool test --no-version-check
  integrity-tests:
    name: Integrity tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json
      - name: Run integrity tests
        run: dotnet test tests/IntegrityTests/IntegrityTests.csproj --configuration Release --logger "GitHubActions;report-warnings=false"
  build-projects:
    name: Build samples & snippets
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.4.0
        with:
          global-json-file: global.json
      - name: Build affected samples & snippets
        shell: pwsh
        run: pwsh.exe -NoLogo -NonInteractive -File .\tools\build-samples-and-snippets.ps1
