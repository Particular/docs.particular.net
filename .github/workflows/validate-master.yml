name: VerifyMaster
on:
  schedule:
    - cron: '0 2/4 * * 1-5' # Every 4 hours, Monday-Friday
  workflow_dispatch:
  push:
    branches:
      - master
env:
  DOTNET_NOLOGO: true
  DOTNET_ROLL_FORWARD: Major
jobs:
  content-verification:
    name: Content verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          global-json-file: global.json
        # Caching is done to limit data transfer on each PR, not to optimize CI speed
      - name: Check docstool version for cache
        run: |
           $curl-url = "curl --connect-timeout 5 --max-time 15 --silent --show-error https://f.feedz.io/particular-software/packages/nuget/v3/packages/particular.docstool/index.json"
           echo "DOCSTOOL_VERSION=$curl-url" >> $GITHUB_ENV
      - name: Cache docstool
        id: cache-docstool
        uses: actions/cache@v5.0.5
        with:
          path: |
             ~/.dotnet/tools/docstool
             ~/.dotnet/tools/.store/particular.docstool
          key: docstool-${{ env.DOCSTOOL_VERSION }}
      - name: Install docstool
        if: steps.cache-docstool.outputs.cache-hit != 'true'
        run: dotnet tool install Particular.DocsTool --global
      - name: Run docstool
        run: docstool test --no-version-check
      - name: Notify Slack on failure
        if: ${{ failure() }}
        shell: pwsh
        run: |
          $headers = @{
              'Authorization' = "Bearer ${{ secrets.SLACK_TOKEN }}"
          }
          $body = @{
            channel = 'docs'
            text = "Content verification has failed on master: https://github.com/Particular/docs.particular.net/actions/workflows/validate-master.yml?query=branch%3Amaster"
            username = 'Content verification'
            icon_emoji = 'github_actions'
            unfurl_links = false
            unfurl_media = false
          } | ConvertTo-Json
          $result = Invoke-RestMethod -Method POST -Uri https://slack.com/api/chat.postMessage -ContentType "application/json; charset=utf-8" -Headers $headers -Body $body
          Write-Output $result
          exit $(If ($result.ok) { 0 } Else { 1 })
  integrity-tests:
    name: Integrity tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          global-json-file: global.json
      - name: Run integrity tests
        run: dotnet test tests/IntegrityTests/IntegrityTests.csproj --configuration Release --logger "GitHubActions;report-warnings=false"
      - name: Notify Slack on failure
        if: ${{ failure() }}
        shell: pwsh
        run: |
          $headers = @{
              'Authorization' = "Bearer ${{ secrets.SLACK_TOKEN }}"
          }
          $body = @{
            channel = 'docs'
            text = "Integrity tests have failed on master: https://github.com/Particular/docs.particular.net/actions/workflows/validate-master.yml?query=branch%3Amaster"
            username = 'Integrity tests'
            icon_emoji = 'github_actions'
            unfurl_links = false
            unfurl_media = false
          } | ConvertTo-Json
          $result = Invoke-RestMethod -Method POST -Uri https://slack.com/api/chat.postMessage -ContentType "application/json; charset=utf-8" -Headers $headers -Body $body
          Write-Output $result
          exit $(If ($result.ok) { 0 } Else { 1 })
  build-samples-and-snippets:
    name: Build samples and snippets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          global-json-file: global.json
      - name: Restore NuGet Cache
        id: nuget-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Build affected samples and snippets
        run: pwsh.exe -NoLogo -NonInteractive -File .\tools\build-samples-and-snippets.ps1
      - name: Save NuGet Cache
        id: nuget-cache-save
        if: always() && steps.nuget-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.nuget/packages
          key: ${{ steps.nuget-cache-restore.outputs.cache-primary-key }}
      - name: Notify Slack on failure
        if: ${{ failure() }}
        shell: pwsh
        run: |
          $headers = @{
              'Authorization' = "Bearer ${{ secrets.SLACK_TOKEN }}"
          }
          $body = @{
            channel = 'docs'
            text = "Failed to build samples and snippets on master: https://github.com/Particular/docs.particular.net/actions/workflows/validate-master.yml?query=branch%3Amaster"
            username = 'Build samples and snippets'
            icon_emoji = 'github_actions'
            unfurl_links = false
            unfurl_media = false
          } | ConvertTo-Json
          $result = Invoke-RestMethod -Method POST -Uri https://slack.com/api/chat.postMessage -ContentType "application/json; charset=utf-8" -Headers $headers -Body $body
          Write-Output $result
          exit $(If ($result.ok) { 0 } Else { 1 })
      - name: Output failed samples and snippets
        if: ${{ failure() }}
        run: cat .\failed-samples-and-snippets.log
